version: 2
updates:
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  groups:
    github-actions:
      patterns:
      - '*'
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
  groups:
    npm-dependencies:
      patterns:
      - '*'
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
  groups:
    pip-dependencies:
      patterns:
      - '*'
